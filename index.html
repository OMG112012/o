<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0e;
  --chrome-hi: #ffffff;
  --chrome-lo: #9898b8;
  --ink: rgba(255,255,255,0.92);
  --ink-soft: rgba(255,255,255,0.55);
  --ink-faint: rgba(255,255,255,0.18);
  --font-d: 'Instrument Serif', serif;
  --font-b: 'Barlow', sans-serif;
}

html { scroll-behavior: smooth; }
body { background: #000; overflow-x: hidden; font-family: var(--font-b); }

/* ── AMBIENT CANVAS ── */
#amb { position: fixed; inset: 0; pointer-events: none; z-index: 1; }

/* ══ LIQUID GLASS ══ */
.liquid-glass {
  background: rgba(255,255,255,0.01);
  background-blend-mode: luminosity;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  border: none;
  box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
  position: relative;
  overflow: hidden;
}
.liquid-glass::before {
  content: "";
  position: absolute; inset: 0;
  border-radius: inherit;
  padding: 1.4px;
  background: linear-gradient(180deg,
    rgba(255,255,255,0.45) 0%,
    rgba(255,255,255,0.15) 20%,
    rgba(255,255,255,0) 40%,
    rgba(255,255,255,0) 60%,
    rgba(255,255,255,0.15) 80%,
    rgba(255,255,255,0.45) 100%);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
}

.liquid-glass-strong {
  background: rgba(255,255,255,0.01);
  background-blend-mode: luminosity;
  backdrop-filter: blur(50px);
  -webkit-backdrop-filter: blur(50px);
  border: none;
  box-shadow: 4px 4px 4px rgba(0,0,0,0.05), inset 0 1px 1px rgba(255,255,255,0.15);
  position: relative;
  overflow: hidden;
}
.liquid-glass-strong::before {
  content: "";
  position: absolute; inset: 0;
  border-radius: inherit;
  padding: 1.4px;
  background: linear-gradient(180deg,
    rgba(255,255,255,0.5) 0%,
    rgba(255,255,255,0.2) 20%,
    rgba(255,255,255,0) 40%,
    rgba(255,255,255,0) 60%,
    rgba(255,255,255,0.2) 80%,
    rgba(255,255,255,0.5) 100%);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
}

/* ── CHROME SURFACE (for below-fold sections) ── */
.chrome-surface {
  background: linear-gradient(145deg,rgba(255,255,255,0.54) 0%,rgba(218,218,234,0.28) 60%,rgba(188,188,210,0.22) 100%);
  border: 1px solid rgba(255,255,255,0.72);
  border-radius: 28px;
  box-shadow: inset 0 1.5px 0 rgba(255,255,255,0.90), inset 0 -1px 0 rgba(0,0,0,0.05), 0 8px 32px rgba(0,0,0,0.14);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  position: relative; overflow: hidden;
}
.chrome-surface::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.85), transparent);
}

/* Chrome section bg (silver, not black) */
.chrome-bg {
  background: linear-gradient(160deg, #d2d2d8 0%, #c8c8d2 50%, #d0d0d8 100%);
  color: rgba(16,14,26,0.88);
}
.chrome-bg .ink   { color: rgba(16,14,26,0.88); }
.chrome-bg .soft  { color: rgba(16,14,26,0.50); }
.chrome-bg .faint { color: rgba(16,14,26,0.20); }

/* ── TICKER ── */
.ticker-wrap { width:100%; overflow:hidden; padding:11px 0; background:rgba(255,255,255,0.06); border-top:1px solid rgba(255,255,255,0.12); border-bottom:1px solid rgba(255,255,255,0.08); }
.ticker-track { display:flex; gap:60px; width:max-content; animation:ticker 36s linear infinite; }
.ticker-item { font-family:var(--font-d); font-size:13px; font-style:italic; color:rgba(255,255,255,0.45); white-space:nowrap; letter-spacing:0.02em; }
@keyframes ticker { from{transform:translateX(0)} to{transform:translateX(-50%)} }

/* chrome bg ticker */
.chrome-bg .ticker-wrap { background:rgba(255,255,255,0.22); border-color:rgba(255,255,255,0.55); }
.chrome-bg .ticker-item { color:rgba(16,14,26,0.38); }

/* ── CHROME DIVIDER ── */
.cdivr { height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.28) 20%,rgba(255,255,255,0.55) 50%,rgba(255,255,255,0.28) 80%,transparent); }
.chrome-bg .cdivr { background:linear-gradient(90deg,transparent,rgba(16,14,26,0.12) 20%,rgba(16,14,26,0.22) 50%,rgba(16,14,26,0.12) 80%,transparent); }

/* ── BOOK MODAL ── */
.modal-bg {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(0,0,0,0.82);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
  animation: fadeIn .3s ease-out both;
}
.modal-inner {
  position: relative;
  width: 100%; max-width: 640px;
  background: linear-gradient(145deg,rgba(255,255,255,0.12),rgba(200,200,220,0.07));
  border: 1px solid rgba(255,255,255,0.22);
  border-radius: 24px;
  box-shadow: inset 0 1.5px 0 rgba(255,255,255,0.35), 0 32px 80px rgba(0,0,0,0.55);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  overflow: hidden;
  animation: slideUp .35s cubic-bezier(.4,0,.2,1) both;
}
.modal-close {
  position: absolute; top: 14px; right: 14px; z-index: 10;
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.22);
  color: rgba(255,255,255,0.8);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 18px; line-height: 1;
  transition: background .2s;
}
.modal-close:hover { background: rgba(255,255,255,0.22); }
.modal-iframe-wrap {
  position: relative; width: 100%; height: 0;
  padding-top: 141.8919%;
  overflow: hidden;
  border-radius: 16px;
}
.modal-iframe-wrap iframe { position: absolute; width: 100%; height: 100%; top: 0; left: 0; border: none; }
.modal-footer {
  padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  border-top: 1px solid rgba(255,255,255,0.10);
}
.modal-footer-text { font-family: var(--font-b); font-size: 12px; color: rgba(255,255,255,0.45); letter-spacing: 0.04em; }
.modal-dl-btn {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.28);
  border-radius: 999px;
  padding: 8px 18px;
  font-family: var(--font-b); font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.9);
  text-decoration: none; letter-spacing: 0.06em; text-transform: uppercase;
  cursor: pointer; transition: background .2s, transform .15s;
}
.modal-dl-btn:hover { background: rgba(255,255,255,0.20); transform: scale(1.02); }
.modal-dl-btn svg { width: 14px; height: 14px; }

/* Chrome-bg modal adjustments */
.chrome-modal .modal-inner { background: linear-gradient(145deg,rgba(255,255,255,0.55),rgba(210,210,228,0.32)); border-color:rgba(255,255,255,0.72); }
.chrome-modal .modal-footer { border-color:rgba(0,0,0,0.08); }
.chrome-modal .modal-footer-text { color:rgba(16,14,26,0.42); }
.chrome-modal .modal-dl-btn { background:rgba(255,255,255,0.55); border-color:rgba(255,255,255,0.8); color:rgba(16,14,26,0.88); }
.chrome-modal .modal-dl-btn:hover { background:rgba(255,255,255,0.75); }
.chrome-modal .modal-close { background:rgba(255,255,255,0.55); border-color:rgba(255,255,255,0.8); color:rgba(16,14,26,0.7); }

/* ── TAG CHIP ── */
.tag-chip {
  font-family: var(--font-b); font-size: 11px; font-weight: 400; color: rgba(255,255,255,0.75);
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.14);
  border-radius: 999px; padding: 4px 13px; letter-spacing: 0.04em;
}
.chrome-bg .tag-chip {
  color: rgba(16,14,26,0.56); background: rgba(255,255,255,0.42);
  border-color: rgba(255,255,255,0.68);
}

/* ── KEYFRAMES ── */
@keyframes fadeIn  { from{opacity:0} to{opacity:1} }
@keyframes slideUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeUp  { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }

/* ── CAPABILITY CARDS ── */
.cap-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 20px; padding: 24px;
  min-height: 360px; display: flex; flex-direction: column;
  position: relative; overflow: hidden;
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 8px 32px rgba(0,0,0,0.22);
  transition: transform .25s, box-shadow .25s;
}
.cap-card::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.18),transparent); }
.cap-card:hover { transform: translateY(-4px); box-shadow: inset 0 1px 0 rgba(255,255,255,0.12), 0 20px 60px rgba(0,0,0,0.32); }

.cap-icon-wrap {
  width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  display: flex; align-items: center; justify-content: center;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.14);
}

/* ── CHARACTER CARDS (chrome bg) ── */
.char-card {
  padding: 22px 18px 18px; border-radius: 22px;
  display: flex; flex-direction: column; gap: 5px;
  transition: transform .25s, box-shadow .25s; cursor: default;
  background: linear-gradient(145deg,rgba(255,255,255,0.54) 0%,rgba(218,218,234,0.28) 60%,rgba(188,188,210,0.22) 100%);
  border: 1px solid rgba(255,255,255,0.72);
  box-shadow: inset 0 1.5px 0 rgba(255,255,255,0.90), 0 4px 16px rgba(0,0,0,0.07);
  position: relative; overflow: hidden;
}
.char-card::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.9),transparent); }
.char-card:hover { transform:translateY(-5px); box-shadow:0 16px 48px rgba(0,0,0,0.10); }
.char-initial { font-family:var(--font-d); font-size:2.6rem; font-weight:300; line-height:1; margin-bottom:4px; background:linear-gradient(160deg,#16142a 0%,#6868a0 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.char-name { font-size:13px; font-weight:500; color:rgba(16,14,26,0.88); letter-spacing:.02em; }
.char-trait { font-size:11px; font-weight:300; color:rgba(16,14,26,0.50); line-height:1.55; margin-top:3px; }

/* ── QUOTE CARD ── */
.rq-card {
  position:relative; padding:52px 36px 36px; border-radius:30px; overflow:hidden;
  background:linear-gradient(145deg,rgba(255,255,255,0.44) 0%,rgba(216,216,232,0.28) 60%,rgba(188,188,212,0.22) 100%);
  border:1px solid rgba(255,255,255,0.74);
  box-shadow:inset 0 1.5px 0 rgba(255,255,255,0.95),inset 0 -1px 0 rgba(0,0,0,0.05),0 24px 64px rgba(0,0,0,0.10);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
}
.rq-dot { position:absolute; border-radius:50%; background:rgba(155,155,188,0.30); pointer-events:none; }
.rq-marks { position:absolute; top:18px; left:24px; font-family:var(--font-d); font-size:3.6rem; font-weight:500; color:rgba(16,14,26,0.88); line-height:1; letter-spacing:-.06em; opacity:.70; user-select:none; }
.rq-txtwrap { min-height:110px; display:flex; align-items:center; justify-content:center; position:relative; }
.rq-txt { font-family:var(--font-d); font-size:clamp(1.1rem,2.2vw,1.4rem); font-style:italic; font-weight:300; color:rgba(16,14,26,0.88); line-height:1.56; text-align:center; opacity:0; transform:translateY(7px); transition:opacity .55s ease,transform .55s ease; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; padding:0 6px; }
.rq-txt.active { opacity:1; transform:translateY(0); position:relative; inset:auto; }
.rq-pill { display:inline-flex; align-items:center; gap:8px; background:linear-gradient(135deg,rgba(255,255,255,0.58),rgba(208,208,228,0.38)); border:1px solid rgba(255,255,255,0.80); border-radius:999px; padding:7px 18px; font-size:10px; font-weight:400; letter-spacing:.12em; text-transform:uppercase; color:rgba(16,14,26,0.52); box-shadow:inset 0 1px 0 rgba(255,255,255,0.9),0 2px 6px rgba(0,0,0,0.06); }
.rq-pill::before { content:'—'; opacity:.45; margin-right:4px; }
.rq-actions { display:flex; flex-direction:column; gap:10px; margin-top:16px; }
.rq-btn { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; background:linear-gradient(135deg,rgba(255,255,255,0.52),rgba(208,208,228,0.28)); border:1px solid rgba(255,255,255,0.74); border-radius:999px; padding:12px 20px; font-family:var(--font-b); font-size:11px; font-weight:400; letter-spacing:.10em; text-transform:uppercase; color:rgba(16,14,26,0.80); cursor:pointer; box-shadow:inset 0 1px 0 rgba(255,255,255,0.9),0 2px 8px rgba(0,0,0,0.06); transition:box-shadow .2s,transform .15s; }
.rq-btn:hover { transform:scale(1.015); box-shadow:inset 0 1px 0 rgba(255,255,255,0.9),0 4px 14px rgba(0,0,0,0.10); }
.rq-btn:active { transform:scale(.98); }
.rq-btnrow { display:flex; gap:10px; }
.rq-btnrow .rq-btn { flex:1; }
.rq-btn svg { width:13px; height:13px; opacity:.55; }
.rq-sparkle { position:absolute; bottom:-10px; right:-10px; width:80px; height:80px; opacity:.07; pointer-events:none; }

/* ── GENERAL CARDS / WALL ── */
.chrome-card { background:linear-gradient(145deg,rgba(255,255,255,0.54),rgba(218,218,234,0.28),rgba(188,188,210,0.22)); border:1px solid rgba(255,255,255,0.72); border-radius:22px; box-shadow:inset 0 1.5px 0 rgba(255,255,255,0.90),0 4px 16px rgba(0,0,0,0.07); position:relative; overflow:hidden; }
.chrome-card::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.85),transparent); }

.wall-msg { padding:16px 20px; border-radius:16px; font-family:var(--font-d); font-size:1rem; font-style:italic; color:rgba(16,14,26,0.88); line-height:1.6; animation:fadeUp .4s ease-out both; }
.wall-anon { font-size:10px; font-weight:400; color:rgba(16,14,26,0.32); font-style:normal; font-family:var(--font-b); letter-spacing:.08em; margin-top:7px; text-transform:uppercase; }

/* ── INPUTS (chrome bg) ── */
.chrome-input { flex:1; border:1px solid rgba(255,255,255,0.65); border-radius:14px; padding:13px 18px; font-family:var(--font-b); font-size:13px; color:rgba(16,14,26,0.88); background:linear-gradient(135deg,rgba(255,255,255,0.55),rgba(210,210,228,0.28)); outline:none; box-shadow:inset 0 1px 0 rgba(255,255,255,0.85),inset 0 2px 6px rgba(0,0,0,0.04); }
.chrome-input:focus { border-color:rgba(255,255,255,0.9); }
.chrome-input::placeholder { color:rgba(16,14,26,0.30); }
.chrome-post-btn { background:linear-gradient(135deg,rgba(16,14,40,0.88),rgba(48,44,80,0.82)); color:rgba(232,232,244,0.92); border:1px solid rgba(78,74,118,0.35); border-radius:14px; padding:13px 22px; font-family:var(--font-b); font-size:12px; font-weight:400; letter-spacing:.05em; cursor:pointer; box-shadow:0 4px 14px rgba(0,0,0,0.14); transition:all .2s; white-space:nowrap; }
.chrome-post-btn:hover { transform:scale(1.02); }

/* ── BREATHE ── */
.bcirc { width:120px; height:120px; border-radius:50%; background:linear-gradient(145deg,rgba(255,255,255,0.54),rgba(198,198,220,0.30)); border:1px solid rgba(255,255,255,0.78); box-shadow:inset 0 2px 0 rgba(255,255,255,0.9),0 8px 32px rgba(0,0,0,0.10); display:flex; align-items:center; justify-content:center; font-family:var(--font-d); font-size:.95rem; font-style:italic; color:rgba(16,14,26,0.55); transition:transform 4s ease-in-out,box-shadow 2s; cursor:pointer; user-select:none; }

.bcirc.hold   { transform:scale(1.38); }

.blbl { font-size:12px; color:rgba(16,14,26,0.50); letter-spacing:.08em; text-transform:uppercase; margin-top:20px; min-height:20px; text-align:center; }

/* ── SECTION LABELS (chrome bg) ── */
.lbl  { font-family:var(--font-b); font-size:10px; font-weight:500; letter-spacing:.20em; text-transform:uppercase; color:rgba(16,14,26,0.48); margin-bottom:12px; }
.ttl  { font-family:var(--font-d); font-size:clamp(2rem,4vw,3rem); font-weight:300; color:rgba(16,14,26,0.88); letter-spacing:-.025em; line-height:1.08; margin-bottom:22px; }
.sbod { font-size:15px; line-height:1.78; color:rgba(16,14,26,0.50); font-weight:300; max-width:600px; }

/* ── SUPPORT / GET SUPPORT ── */
.gs-wrap { background:linear-gradient(160deg,#16142a 0%,#28264a 60%,#16142a 100%); padding:90px 48px; text-align:center; overflow:hidden; position:relative; z-index:1; }
.sit { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.10); border-radius:20px; padding:22px 24px; text-align:left; transition:background .2s; }
.sit:hover { background:rgba(255,255,255,0.08); }
.sit-t { font-size:10px; font-weight:500; letter-spacing:.14em; text-transform:uppercase; color:rgba(200,200,220,0.35); margin-bottom:7px; }
.sit-v { font-family:var(--font-d); font-size:1.15rem; color:rgba(232,232,244,0.88); font-weight:300; }
.sit-d { font-size:12px; color:rgba(200,200,220,0.35); margin-top:5px; line-height:1.55; }

/* ── FOOTER ── */
footer { padding:36px 48px; border-top:1px solid rgba(255,255,255,0.22); display:flex; flex-direction:column; align-items:center; gap:12px; text-align:center; background:linear-gradient(0deg,rgba(212,212,218,1),rgba(220,220,226,0.55)); }
.ftlogo { font-family:var(--font-d); font-size:1.5rem; font-weight:300; color:rgba(16,14,26,0.88); letter-spacing:-.02em; }
.ftcopy { font-size:11px; color:rgba(16,14,26,0.28); letter-spacing:.05em; line-height:1.8; }
.ftcris { font-size:12px; color:rgba(16,14,26,0.50); line-height:1.8; }
.ftcris a { color:rgba(16,14,26,0.80); text-decoration:underline; text-decoration-color:rgba(16,14,26,0.22); }

<script type="text/babel">
const { useRef, useEffect, useState, useCallback } = React;
const { motion, useInView, AnimatePresence } = window.Motion;

/* ══ FADING VIDEO ══ */
const FADE_MS = 500;
const FADE_OUT_LEAD = 0.55;

function FadingVideo({ src, className, style }) {
  const vidRef = useRef(null);
  const rafRef = useRef(null);
  const fadingOutRef = useRef(false);

  const fadeTo = useCallback((target, duration) => {
    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    const vid = vidRef.current;
    if (!vid) return;
    const start = performance.now();
    const from = parseFloat(vid.style.opacity) || 0;
    function step(now) {
      const t = Math.min((now - start) / duration, 1);
      vid.style.opacity = from + (target - from) * t;
      if (t < 1) rafRef.current = requestAnimationFrame(step);
    }
    rafRef.current = requestAnimationFrame(step);
  }, []);

  useEffect(() => {
    const vid = vidRef.current;
    if (!vid) return;
    vid.style.opacity = '0';

    function onLoaded() { vid.play().catch(() => {}); fadeTo(1, FADE_MS); }
    function onTimeUpdate() {
      if (!fadingOutRef.current && vid.duration && vid.duration - vid.currentTime <= FADE_OUT_LEAD && vid.duration - vid.currentTime > 0) {
        fadingOutRef.current = true;
        fadeTo(0, FADE_MS);
      }
    }
    function onEnded() {
      vid.style.opacity = '0';
      setTimeout(() => {
        vid.currentTime = 0;
        vid.play().catch(() => {});
        fadingOutRef.current = false;
        fadeTo(1, FADE_MS);
      }, 100);
    }

    vid.addEventListener('loadeddata', onLoaded);
    vid.addEventListener('timeupdate', onTimeUpdate);
    vid.addEventListener('ended', onEnded);
    return () => {
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
      vid.removeEventListener('loadeddata', onLoaded);
      vid.removeEventListener('timeupdate', onTimeUpdate);
      vid.removeEventListener('ended', onEnded);
    };
  }, [fadeTo]);

  return (
    <video ref={vidRef} src={src} muted playsInline preload="auto" className={className} style={{ opacity: 0, ...style }} />
  );
}

/* ══ BLUR TEXT (word-by-word) ══ */
function BlurText({ text, className }) {
  const ref = useRef(null);
  const isInView = useInView(ref, { once: true, amount: 0.1 });
  const words = text.split(' ');
  return (
    <p ref={ref} style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'center', rowGap: '0.1em' }} className={className}>
      {words.map((word, i) => (
        <motion.span key={i}
          style={{ display: 'inline-block', marginRight: '0.28em' }}
          initial={{ filter: 'blur(10px)', opacity: 0, y: 50 }}
          animate={isInView ? { filter: ['blur(10px)','blur(5px)','blur(0px)'], opacity: [0,0.5,1], y: [50,-5,0] } : {}}
          transition={{ duration: 0.7, times: [0,0.5,1], ease: 'easeOut', delay: (i * 100) / 1000 }}
        >{word}</motion.span>
      ))}
    </p>
  );
}

  /* Breathing */
  const [breathState, setBreathState] = useState({ cls: '', label: '', active: false });

  function startBreath() {
    if (breathState.active) return;
    const steps = [{ cls: 'inhale', label: 'Inhale… 4', d: 4000 }, { cls: 'hold', label: 'Hold… 7', d: 7000 }, { cls: 'exhale', label: 'Exhale… 8', d: 8000 }];
    let i = 0;
    setBreathState({ cls: steps[0].cls, label: steps[0].label, active: true });
    function next() {
      i++;
      if (i >= steps.length * 3) { setBreathState({ cls: '', label: '', active: false }); return; }
      const s = steps[i % 3];
      setBreathState({ cls: s.cls, label: s.label, active: true });
      breathTimer.current = setTimeout(next, s.d);
    }
    breathTimer.current = setTimeout(next, steps[0].d);

<!-- ══════════════════════════════════
     AMBIENT CANVAS: CHROME RINGS + BUTTERFLIES
══════════════════════════════════ -->
<script>
(function(){
  const cv = document.getElementById('amb');
  const cx = cv.getContext('2d');
  let W, H, rings = [], butts = [];

  function resize(){ W = cv.width = window.innerWidth; H = cv.height = window.innerHeight; }
  window.addEventListener('resize', resize); resize();

  function mkRing(){
    rings.push({
      x: Math.random()*W, y: Math.random()*H,
      r: 40 + Math.random()*130,
      a: 0, ma: .04 + Math.random()*.07, phase: 'in',
      spd: .002 + Math.random()*.004,
      sw: .7 + Math.random()*1.4,
      layers: 1 + Math.floor(Math.random()*3)
    });
  }
  for(let i=0;i<8;i++) mkRing();

  function drawRings(){
    rings.forEach((r,i)=>{
      r.phase==='in'?(r.a+=r.spd,r.a>=r.ma&&(r.phase='out')):(r.a-=r.spd*.5,r.a<=0&&(rings.splice(i,1),mkRing()));
      for(let l=0;l<r.layers;l++){
        const g=14*l;
        cx.beginPath(); cx.arc(r.x,r.y,r.r+g,0,Math.PI*2);
        const grd=cx.createLinearGradient(r.x-r.r,r.y-r.r,r.x+r.r,r.y+r.r);
        grd.addColorStop(0,`rgba(255,255,255,${r.a*1.5})`);
        grd.addColorStop(.5,`rgba(180,180,220,${r.a})`);
        grd.addColorStop(1,`rgba(255,255,255,${r.a*.5})`);
        cx.strokeStyle=grd; cx.lineWidth=r.sw; cx.stroke();
      }
    });
  }

  function mkButt(){
    const left=Math.random()<.5;
    butts.push({
      x:left?-50:W+50, y:80+Math.random()*(H*.75),
      vx:(left?1:-1)*(.3+Math.random()*.6),
      vy:(Math.random()-.5)*.45,
      sz:7+Math.random()*14,
      angle:left?0:Math.PI,
      t:Math.random()*Math.PI*2,
      a:0, ma:.08+Math.random()*.12,
      life:0, ml:260+Math.random()*440
    });
  }
  for(let i=0;i<6;i++) mkButt();

  function drawWing(x,y,sz,angle,t){
    cx.save(); cx.translate(x,y); cx.rotate(angle);
    const f=Math.sin(t*3.8)*.38;
    cx.beginPath();
    cx.moveTo(0,0);
    cx.bezierCurveTo(-sz,-sz*(.78+f),-sz*1.9,-sz*.18,0,sz*.28);
    cx.bezierCurveTo(sz*1.9,-sz*.18,sz,-sz*(.78+f),0,0);
    cx.moveTo(0,sz*.18);
    cx.bezierCurveTo(-sz*.75,sz*(.45+f*.45),-sz*1.3,sz*1.1,0,sz*.75);
    cx.bezierCurveTo(sz*1.3,sz*1.1,sz*.75,sz*(.45+f*.45),0,sz*.18);
    cx.restore();
  }

  function drawButts(){
    butts.forEach((b,i)=>{
      b.t+=.038; b.life++; b.x+=b.vx; b.y+=b.vy+Math.sin(b.t*.48)*.28;
      b.angle=Math.atan2(b.vy,b.vx);
      if(b.life<40) b.a=(b.life/40)*b.ma;
      else if(b.life>b.ml-40) b.a=((b.ml-b.life)/40)*b.ma;
      else b.a=b.ma;
      if(b.life>=b.ml||b.x<-100||b.x>W+100){
        butts.splice(i,1); setTimeout(mkButt,1500+Math.random()*4000); return;
      }
      cx.save(); cx.globalAlpha=b.a;
      const grd=cx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.sz*2.2);
      grd.addColorStop(0,'rgba(255,255,255,0.88)');
      grd.addColorStop(.5,'rgba(210,210,240,0.52)');
      grd.addColorStop(1,'rgba(170,170,210,0.10)');
      drawWing(b.x,b.y,b.sz,b.angle,b.t);
      cx.fillStyle=grd; cx.fill();
      drawWing(b.x,b.y,b.sz,b.angle,b.t);
      cx.strokeStyle=`rgba(224,224,248,${b.a*.7})`; cx.lineWidth=.55; cx.stroke();
      cx.save(); cx.translate(b.x,b.y); cx.rotate(b.angle);
      cx.beginPath(); cx.ellipse(0,0,b.sz*.07,b.sz*.52,0,0,Math.PI*2);
      cx.fillStyle=`rgba(180,180,215,0.42)`; cx.fill();
      cx.restore(); cx.restore();
    });
  }

  (function loop(){ cx.clearRect(0,0,W,H); drawRings(); drawButts(); requestAnimationFrame(loop); })();
})();
</script>
